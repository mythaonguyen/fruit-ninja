<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Face Ninja</title>
  <script>
    // GitHub Pages project sites live at /repo-name/ — fix relative asset paths.
    (function () {
      if (!location.hostname.endsWith("github.io")) return;
      const parts = location.pathname.split("/").filter(function (p) {
        return p && !p.endsWith(".html");
      });
      if (!parts.length) return;
      var base = document.createElement("base");
      base.href = "/" + parts[0] + "/";
      document.head.appendChild(base);
    })();
  </script>
  <link rel="stylesheet" href="static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <script type="module">
    window.__mpVisionPromise = import(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/+esm"
    );
  </script>
</head>
<body>
  <div id="game-container"></div>
  <script src="static/face.js"></script>
  <script src="static/objects.js"></script>
  <script src="static/ui.js"></script>
  <script src="static/screens.js"></script>
  <script src="static/game.js"></script>
</body>
</html>
